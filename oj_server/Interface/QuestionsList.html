<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线OJ - 题目列表</title>
    <link rel="stylesheet" href="/Interface/QuestionsList.css">
</head>

<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <div>
                <a href="/">首页</a>
                <a href="/questionsListl">题库</a>
            </div>
            <a class="login" href="#">登录</a>
        </div>

        <!-- 题目列表 -->
        <div class="question_list">
            <h1>OJ 题目列表</h1>
            <table>
                <thead>
                    <tr>
                        <th class="item">编号</th>
                        <th class="item">标题</th>
                        <th class="item">难度</th>
                    </tr>
                </thead>
                <tbody>
                    {{#question_list}}
                    <tr>
                        <td class="item">{{num}}</td>
                        <td class="item"><a href="/question/{{num}}">{{name}}</a></td>
                        <!-- 难度需配合数据使用：easy/medium/hard -->
                        <td class="item">
                            <span class="difficulty-{{star}}">{{star}}</span>
                        </td>
                    </tr>
                    {{/question_list}}
                </tbody>
            </table>
        </div>

        <div class="footer">
            ©zlx60606@163.com
        </div>
    </div>
</body>

</html>
