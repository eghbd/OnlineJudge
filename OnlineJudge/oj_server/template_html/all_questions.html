<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线OJ - 题目列表</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        /* 导航栏样式 */
        .navbar {
            width: 100%;
            height: 60px;
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar a {
            color: #ecf0f1;
            text-decoration: none;
            padding: 0 20px;
            height: 60px;
            line-height: 60px;
            transition: background-color 0.3s ease;
            font-size: 16px;
            font-weight: 500;
        }

        .navbar a:hover {
            background-color: #34495e;
        }

        .navbar .login {
            background-color: #27ae60;
            border-radius: 6px;
            padding: 0 24px;
            height: 40px;
            line-height: 40px;
            margin-left: 20px;
        }

        .navbar .login:hover {
            background-color: #2ecc71;
        }

        /* 题目列表容器 */
        .question_list {
            max-width: 1100px;
            margin: 40px auto;
            padding: 40px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .question_list h1 {
            color: #2c3e50;
            font-size: 30px;
            margin-bottom: 35px;
            text-align: left;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 18px;
            font-weight: 700;
        }

        /* 表格样式 */
        .question_list table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        .question_list th,
        .question_list td {
            padding: 18px 24px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .question_list th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.8px;
        }

        .question_list tr {
            transition: background-color 0.25s ease;
        }

        .question_list tr:hover {
            background-color: #f8f9fa;
        }

        /* 题目链接样式 */
        .question_list .item a {
            color: #2980b9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .question_list .item a:hover {
            color: #3498db;
            text-decoration: underline;
        }

        /* 难度标签样式 */
        .difficulty-easy {
            color: #27ae60;
            font-weight: 600;
        }

        .difficulty-medium {
            color: #f39c12;
            font-weight: 600;
        }

        .difficulty-hard {
            color: #e74c3c;
            font-weight: 600;
        }

        /* 页脚样式 */
        .footer {
            text-align: center;
            padding: 35px 0;
            color: #95a5a6;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <div>
                <a href="/">首页</a>
                <a href="/all_questions">题库</a>
            </div>
            <a class="login" href="#">登录</a>
        </div>

        <!-- 题目列表 -->
        <div class="question_list">
            <h1>OJ 题目列表</h1>
            <table>
                <thead>
                    <tr>
                        <th class="item">编号</th>
                        <th class="item">标题</th>
                        <th class="item">难度</th>
                    </tr>
                </thead>
                <tbody>
                    {{#question_list}}
                    <tr>
                        <td class="item">{{number}}</td>
                        <td class="item"><a href="/question/{{number}}">{{title}}</a></td>
                        <!-- 难度需配合数据使用：easy/medium/hard -->
                        <td class="item">
                            <span class="difficulty-{{star}}">{{star}}</span>
                        </td>
                    </tr>
                    {{/question_list}}
                </tbody>
            </table>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            © 2026 在线OJ. All rights reserved.
        </div>
    </div>
</body>

</html>
