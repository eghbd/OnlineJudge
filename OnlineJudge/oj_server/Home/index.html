<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJ系统</title>
    <style>
        /* 全局样式重置与基础配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        /* 核心背景图设置 */
        body {
            position: relative;
            /* 背景图路径：同目录下的1.jpg */
            background: url("1.jpg") center center / cover no-repeat fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 背景遮罩：解决文字和背景融合看不清的问题，可调整透明度 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* 容器全屏适配 */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏样式 - 与题库页风格统一，增加毛玻璃效果 */
        .container .navbar {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .container .navbar a {
            color: #ffffff;
            text-decoration: none;
            padding: 0 20px;
            height: 60px;
            line-height: 60px;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .container .navbar a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .container .navbar .login {
            background-color: rgba(39, 174, 96, 0.9);
            border-radius: 6px;
            padding: 0 24px;
            height: 40px;
            line-height: 40px;
            margin-left: 20px;
        }

        .container .navbar .login:hover {
            background-color: rgba(46, 204, 113, 1);
        }

        /* 内容区域 - 垂直水平居中，适配所有屏幕 */
        .container .content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        /* 文字样式优化 - 保证背景上的可读性 */
        .container .content .font_ {
            color: #ffffff;
            text-decoration: none;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        }

        .container .content h1.font_ {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }

        /* 开始编程按钮 - 醒目交互效果 */
        .container .content a.font_ {
            font-size: 20px;
            font-weight: 500;
            background-color: rgba(39, 174, 96, 0.9);
            padding: 12px 40px;
            border-radius: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .container .content a.font_:hover {
            background-color: rgba(46, 204, 113, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <div>
                <a href="/">首页</a>
                <a href="/all_questions">题库</a>
            </div>
            <a class="login" href="#">登录</a>
        </div>
        <!-- 网页核心内容 -->
        <div class="content">
            <h1 class="font_">欢迎来到我的OnlineJudge平台</h1>
            <a class="font_" href="/all_questions">开始编程!</a>
        </div>
    </div>
</body>

</html>
